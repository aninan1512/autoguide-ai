version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: autoguide_pg
    restart: always
    environment:
      POSTGRES_USER: autoguide
      POSTGRES_PASSWORD: autoguide
      POSTGRES_DB: autoguide
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: autoguide_backend
    restart: always
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql://autoguide:autoguide@postgres:5432/autoguide

volumes:
  pgdata: